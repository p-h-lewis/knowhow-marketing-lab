      /* Body defaults */
      *,*::before,*::after{box-sizing:border-box}

      img,svg{display:block;max-width:100%}
      /* Skip to content */

      /* Announcement bar */
      .ann-bar{position:fixed;top:0;left:0;right:0;z-index:50;background:#B8691A;color:#fff;font-size:.875rem;padding:.625rem 2.5rem;display:flex;align-items:center;justify-content:center}
      /* Navbar shell */
      .nav-shell{position:fixed;top:2.5rem;left:0;right:0;z-index:40;background:#fff;border-bottom:1px solid #e5e7eb;transition:box-shadow .2s}
      .nav-shell.scrolled{box-shadow:0 2px 12px rgba(0,0,0,.08)}
      /* Container */
      .container{width:100%;margin-left:auto;margin-right:auto;padding-left:1rem;padding-right:1rem}
      @media(min-width:640px){.container{padding-left:1.5rem;padding-right:1.5rem}}
      @media(min-width:1024px){.container{padding-left:2rem;padding-right:2rem;max-width:1280px}}
      /* Hero section padding is handled by Tailwind classes in HeroSection.tsx */
      /* Fade-up animations */
      @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
      .fade-up-1{animation:fadeUp .55s .1s ease both}
      .fade-up-2{animation:fadeUp .55s .2s ease both}
      /* Reduced motion */
      @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}}
    </style>

    <!-- Deferred third-party scripts: GTM + GHL load after first user interaction -->
    <!-- This keeps GTM, GA4, Clarity, and GHL off the critical render path -->
    <!-- All tracking still fires — just after the page is interactive -->
    <script>
    (function() {
      var loaded = false;
      function loadThirdParty() {
        if (loaded) return;
        loaded = true;

        // Google Tag Manager (deferred)
        (function(w,d,s,l,i){
          w[l]=w[l]||[];
          w[l].push({'gtm.start': new Date().getTime(), event:'gtm.js'});
          var f=d.getElementsByTagName(s)[0],
              j=d.createElement(s),
              dl=l!='dataLayer'?'&l='+l:'';
          j.async=true;
          j.src='https://www.googletagmanager.com/gtm.js?id='+i+dl;
          f.parentNode.insertBefore(j,f);
        })(window,document,'script','dataLayer','GTM-W449WJS');

        // GHL External Tracking (deferred)
        var ghlScript = document.createElement('script');
        ghlScript.src = 'https://crm.seymourdigitalmedia.com/js/external-tracking.js';
        ghlScript.setAttribute('data-tracking-id', 'tk_6415a2a5069f4384b0d41a2fa6e81190');
        ghlScript.async = true;
        document.head.appendChild(ghlScript);
      }

      // Load on first user interaction: scroll, click, touch, or keydown
      ['scroll','click','touchstart','keydown'].forEach(function(evt) {
        window.addEventListener(evt, loadThirdParty, {once: true, passive: true});
      });

      // Fallback: load after 5 seconds even if no interaction (ensures bots and slow users still tracked)
      setTimeout(loadThirdParty, 5000);
    })();
